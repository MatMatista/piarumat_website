<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piarumat | Progetti</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <video autoplay loop muted playsinline id="video-sfondo">
        <source src="background.mp4" type="video/mp4">
        Il tuo browser non supporta i video come sfondo.
    </video>
    <<header>
    <div class="logo-container">
        <img src="logo.png" alt="Piarumat Logo" class="site-logo">
        <span class="site-title">Piarumat</span>
    </div>
    
    <nav id="nav-menu">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="progetti.html">Progetti</a></li>
            <li><a href="contatti.html" class="pagina-corrente">Contatti</a></li>
        </ul>
    </nav>

    <button class="hamburger-btn" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </button>
</header>
    <section class="contatti-section">
        <div class="contatti-container">
            <h2>Mettiti in <span>contatto</span></h2>
            <p class="sottotitolo">Hai una domanda o vuoi segnalare un bug in un mio plugin? Compila il modulo qui sotto.</p>

            <form id="contact-form">
                
                <input type="hidden" name="access_key" value="6b09fd2a-68c2-4d21-bdc4-8a108caff686">
                
                <input type="hidden" name="subject" id="hidden-subject">

                <div class="input-group">
                    <label for="nome">Nome / Nickname</label>
                    <input type="text" id="nome" name="name" required placeholder="Es. Mario o PiarumatFan">
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Es. la-tua-mail@gmail.com">
                </div>

                <div class="input-group">
                    <label for="categoria">Motivo del contatto</label>
                    <select id="categoria" required>
                        <option value="" disabled selected>Scegli un'opzione...</option>
                        <option value="[Info Generiche]">Informazioni Generali</option>
                        <option value="[Bug Report]">Segnalazione Bug (Plugin)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="oggetto-utente">Oggetto</label>
                    <input type="text" id="oggetto-utente" required placeholder="Di cosa si tratta?">
                </div>

                <div class="input-group">
                    <label for="messaggio">Messaggio</label>
                    <textarea id="messaggio" name="message" rows="6" required placeholder="Scrivi qui il tuo messaggio nei dettagli..."></textarea>
                </div>

                <button type="submit" class="bottone-invia">Invia Messaggio</button>
            </form>

            <div id="form-result" class="form-result"></div>
        </div>
    </section>

    <script src="contatti.js"></script>
    <script src="hamburger.js"></script>
</body>
<footer>
        <p>&copy; Piarumat 2026 - Tutti i diritti sono riservati</p>
</footer>
</html>
